name: Keep HF Backends Awake

on:
  schedule:
    - cron: "*/10 * * * *" # Runs every 10 minutes automatically
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Original 37k Backend
        run: |
          curl -s https://vinu019-resume-backend.hf.space/api/live-status > /dev/null
          echo "Successfully pinged Original backend!"

      - name: Ping Demo Backend
        run: |
          # BRO: REPLACE THE URL BELOW WITH YOUR ACTUAL DEMO BACKEND URL!
          curl -s https://YOUR-DEMO-BACKEND-URL.hf.space/api/live-status > /dev/null
          echo "Successfully pinged Demo backend!"